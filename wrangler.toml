name = "xugou-service-status"
main = "backend/src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

minify = true # 生产环境压缩代码

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["0,30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "xugou_d1" # 使用占位符
database_id = "2219eb8d-de45-449b-a7d6-c56090eb18e4" # 使用占位符


[assets]
binding = "ASSETS"
directory = "frontend/dist"
not_found_handling = "single-page-application"

[version_metadata]
binding = "CF_VERSION_METADATA"
